<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Luxusio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:linear-gradient(135deg,#0b1120,#111827);color:#f5f5f5}
nav{display:flex;justify-content:space-between;align-items:center;padding:20px 60px;background:#000}
nav a{text-decoration:none;color:#f5f5f5;margin-left:30px;transition:.3s}
nav a:hover{color:#d4af37}
header{height:50vh;background:linear-gradient(rgba(0,0,0,.6),rgba(0,0,0,.6)),url('https://images.unsplash.com/photo-1503376780353-7e6692767b70');background-size:cover;background-position:center;display:flex;justify-content:center;align-items:center}
header h1{font-size:42px;letter-spacing:3px;color:#d4af37}
section{padding:80px 60px;max-width:900px;margin:auto}
form{display:flex;flex-direction:column;gap:20px}
input,textarea{padding:15px;background:#111827;border:1px solid #333;color:#fff;border-radius:8px}
input:focus,textarea:focus{outline:none;border-color:#d4af37}
button{padding:12px;border:none;background:#d4af37;color:#000;font-weight:600;border-radius:25px;cursor:pointer;transition:.3s}
button:hover{box-shadow:0 0 15px #d4af37}
.contact-info{margin-top:50px;color:#ccc;line-height:1.8}
footer{text-align:center;padding:30px;background:#000;color:#aaa;margin-top:40px}
@media(max-width:768px){nav{padding:20px}section{padding:60px 20px}}
</style>
</head>
<body>
<nav>
<h2>LUXUSIO</h2>
<div>
<a href="home.html">Home</a>
<a href="models.html">Models</a>
<a href="about.html">About</a>
</div>
</nav>
<header>
<h1>Contact Luxusio</h1>
</header>
<section>
<form>
<input type="text" placeholder="Full Name" required>
<input type="email" placeholder="Email Address" required>
<input type="text" placeholder="Subject">
<textarea rows="6" placeholder="Your Message"></textarea>
<button type="submit">Send Message</button>
</form>
<div class="contact-info">
<p><strong>Email:</strong> contact@luxusio.com</p>
<p><strong>Phone:</strong> +1 234 567 890</p>
<p><strong>Headquarters:</strong> Global Luxury Mobility District</p>
</div>
</section>
<footer>
© 2026 Luxusio Automobile Brand. All Rights Reserved.
</footer>
</body>
</html>
